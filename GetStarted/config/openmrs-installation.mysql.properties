# OpenMRS auto-install properties for MySQL / MariaDB.
#
# Used by run-openmrs.* -Mode MySQL: the runner passes
#   -DOPENMRS_INSTALLATION_SCRIPT=file:<this file>
# so OpenMRS installs itself against this database on first start (no web wizard).
#
# 1. Create the database and user, e.g.:
#      CREATE DATABASE openmrs CHARACTER SET utf8mb4 COLLATE utf8mb4_general_ci;
#      CREATE USER 'openmrs'@'%' IDENTIFIED BY 'openmrs';
#      GRANT ALL PRIVILEGES ON openmrs.* TO 'openmrs'@'%';
#      FLUSH PRIVILEGES;
# 2. Edit connection.url / connection.username / connection.password below.
# 3. Run: ./run-openmrs.sh --mode mysql   (or .\run-openmrs.ps1 -Mode MySQL)

install_method=auto

connection.url=jdbc:mysql://localhost:3306/openmrs?autoReconnect=true&useUnicode=true&characterEncoding=UTF-8
connection.driver_class=com.mysql.cj.jdbc.Driver
connection.username=openmrs
connection.password=openmrs

database_name=openmrs
has_current_openmrs_database=false
create_database_user=false
create_tables=true
module_web_admin=true
auto_update_database=false

admin_user_password=Admin123

# Hibernate dialect is normally inferred from the driver. If you hit a dialect
# error, uncomment one of these:
# hibernate.dialect=org.hibernate.dialect.MySQL57Dialect
# hibernate.dialect=org.hibernate.dialect.MariaDB103Dialect
