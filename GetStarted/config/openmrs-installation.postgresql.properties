# OpenMRS auto-install properties for PostgreSQL.
#
# Used by run-openmrs.* -Mode Postgres: the runner passes
#   -DOPENMRS_INSTALLATION_SCRIPT=file:<this file>
# so OpenMRS installs itself against this database on first start (no web wizard).
#
# 1. Create the database and a role. The installing role needs SUPERUSER for the
#    first run so liquibase can create the required extensions (uuid-ossp and
#    the fuzzystrmatch/soundex extension), e.g.:
#      CREATE DATABASE openmrs;
#      CREATE ROLE openmrs WITH LOGIN SUPERUSER PASSWORD 'openmrs';
# 2. Edit connection.url / connection.username / connection.password below.
# 3. Run: ./run-openmrs.sh --mode postgres   (or .\run-openmrs.ps1 -Mode Postgres)

install_method=auto

connection.url=jdbc:postgresql://localhost:5432/openmrs
connection.driver_class=org.postgresql.Driver
connection.username=openmrs
connection.password=openmrs

database_name=openmrs
has_current_openmrs_database=false
create_database_user=false
create_tables=true
module_web_admin=true
auto_update_database=false

admin_user_password=Admin123

# Hibernate dialect is normally inferred from the PostgreSQL driver. If you hit
# a dialect error, uncomment:
# hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
