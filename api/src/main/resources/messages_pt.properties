MRNGenerator.title=Gerar Lista de Numeros Registro MĂŠdico (MRNs)
MRNGenerator.description=E extremamente importante que identificadores de paciente ser distribuido a partir de uma autoridade central. Caso contrĂĄrio, a probabilidade de erro atribuir o mesmo numero de registo mĂŠdico (MRN), para mais de uma pessoa aumenta. Do mesmo modo, um unico individuo, em cada unidade sanitaria deve ser encarregado de atribuir novos identificadores. <br/> <br/> O formato geral para numeros prontuĂĄrio ĂŠ 123MT-2, em que 123 ĂŠ um numero sequencial, MT representa o local-especifico, e sufixo -2 ĂŠ o dĂ­gito verificador. Abaixo, basta selecionar o local, o ponto de partida o numero de ordem, bem como o numero de identificadores que voce precisa. Um arquivo de texto que contem a ficha medica numeros (incluindo bom verificar digitos) sera gerado e transferido para o seu computador. <br/> <br/> NOTA: este e apenas um servico de gerar o bom verificar digitos em granel. Ă sua responsabilidade garantir que esses numeros sÄo distribuĂ­dos atravĂŠs de uma autoridade central? ou seja, os identificadores sao atribuidos uma vez e apenas uma vez para um paciente.
