MRNGenerator.description=Es crÃ­ticamente importante que los id de los pacientes sean distribuidos de una autoridad central. Por otra parte, la probabilidad de error en asignar el mismo nÃšmero de registro mÃĐdico (MRN) a mÃĄs de una persona aumenta. Del mismo modo, un  solo individuo en cada clÃ­nica deberÃ­a ser responsable de asignar nuevos identificadores. <br/> <br/> el formato general para nÃšmeros de registro mÃĐdicos es 123MT-2, donde 123 es un nÃšmero secuencial, MT representa el sufijo especÃ­fico al sitio, y-2 es el dÃ­gito de control.Debajo, simplemente seleccione el sitio, el nÃšmero de secuencia de inicio, y el Nro. de Ids que necesite. Un archivo de texto conteniendo los Nros. de Registro Medico(incluyendo los digitos de control apropiados seran generados y descargados en su Computadora.<br/><br/>NOTA: esto es simplemente un servicio para generar estos digitos de chequeo en conjunto. Es su responsabilidad asegurarse que sean distribuidos a la autoridad central de control? p.e., los Ids son asignados una vez y solo una vez para un paciente.
