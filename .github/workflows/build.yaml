# standard build with Maven and push coverage data
name: Build with Maven

# trigger build on branches that *should* support both Java 8 and Java 11
on:
  push:
    branches:
      - master
      - 2.9.x
      - 2.8.x
  pull_request:
    branches:
      - master
      - 2.9.x
      - 2.8.x
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    strategy:
      matrix:
        platform:
          - ubuntu-latest
          - windows-latest
        java-version:
          - 8
          - 11
          - 17
          - 21
          # Infinispan 13.x is not compatible with Java 24. It can only be upgraded with Hibernate 6.x
          #- 24
        isPR:
          - ${{ github.event_name == 'pull_request' }}
        test-profile: ["", "-Pintegration-test -Pskip-default-test", "-Pperformance-test -Pskip-default-test"]
        exclude:
          - platform: windows-latest
            java-version: 11
          - platform: windows-latest
            java-version: 17
          - platform: windows-latest
            java-version: 21
          #- platform: windows-latest
          #  java-version: 24
          # Do not run performance tests on PRs and older Java versions
          - test-profile: '-Pperformance-test -Pskip-default-test'
            isPR: true
          - test-profile: '-Pperformance-test -Pskip-default-test'
            java-version: 8
          - test-profile: '-Pperformance-test -Pskip-default-test'
            java-version: 11
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
          cache: 'maven'
      - name: Install dependencies
        run: mvn clean install -DskipTests=true -D"maven.javadoc.skip"=true --batch-mode --show-version --file pom.xml
      - name: Test
        run: mvn test ${{ matrix.test-profile }} --batch-mode --file pom.xml
      # this is necessary to populate the environment variables for Coveralls properly
      - name: Set branch name and PR number
        id: refs
        if: ${{ matrix.test-profile == '' && matrix.java-version == '8' }}
        continue-on-error: true
        env:
          BRANCH_NAME_OR_REF: ${{ github.head_ref || github.ref }}
        run: |
          echo "::set-output name=branch_name::${BRANCH_NAME_OR_REF#refs/heads/}"
          echo "::set-output name=pr_number::$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")"
      - name: Update coverage data
        # only send coverage data for Java 8
        if: ${{ matrix.test-profile == '' && matrix.java-version == '8' && matrix.platform == 'ubuntu-latest' && steps.refs.outcome == 'success' }}
        continue-on-error: true
        env:
          CI_NAME: Github
          CI_BUILD_NUMBER: ${{ github.run_id }}
          CI_BUILD_URL: https://github.com/${{ github.repository }}/commit/${{ github.event.after }}/checks
          CI_BRANCH: ${{ steps.refs.outputs.branch_name }}
          CI_PULL_REQUEST: ${{ steps.refs.outputs.pr_number }}
        run: mvn jacoco:report coveralls:report --batch-mode --file pom.xml --no-transfer-progress -DrepoToken=${{ secrets.COVERALLS_TOKEN }}

  deploy-snapshot:
    name: Deploy SNAPSHOT to Maven
    needs: build
    # Mirrors the deploy job of openmrs-contrib-gha-workflows/build-backend-module.yml:
    # deploy only on direct pushes to the canonical repo (never PRs or forks).
    if: ${{ github.event_name == 'push' && github.repository == 'openmrs/openmrs-core' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 8
          cache: 'maven'
          server-id: openmrs-repo-snapshots
          server-username: MAVEN_REPO_USERNAME
          server-password: MAVEN_REPO_API_KEY
      - name: Check project version is a SNAPSHOT
        id: snapshot
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --batch-mode)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "is_snapshot=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_snapshot=false" >> "$GITHUB_OUTPUT"
            echo "Project version $VERSION is not a SNAPSHOT; skipping deploy."
          fi
      - name: Deploy SNAPSHOT to Maven
        if: ${{ steps.snapshot.outputs.is_snapshot == 'true' }}
        run: mvn deploy -DskipTests=true -D"maven.javadoc.skip"=true --batch-mode --show-version --file pom.xml
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
